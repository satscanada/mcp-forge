openapi: "3.0.3"
info:
  title: Minimal API
  description: Bare valid OAS 3.0 spec for testing.
  version: "1.0.0"
servers:
  - url: https://api.example.com
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      description: Returns all items.
      tags:
        - items
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of items to return.
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "400":
          description: Bad request
