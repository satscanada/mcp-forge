openapi: "3.0.3"
info:
  title: Retail Banking API
  description: |
    Core retail banking API for account management, transactions, and overdraft
    prevention. Provides read/write access to customer accounts, transaction history,
    balance inquiries, and alert configuration for proactive overdraft prevention.
  version: "1.0.0"
  contact:
    name: Banking API Platform Team
    email: api-platform@bank.example.ca
  license:
    name: Internal Use Only
    url: https://bank.example.ca/api-terms

servers:
  - url: https://api.bank.example.ca/v1
    description: Production
  - url: https://api-sandbox.bank.example.ca/v1
    description: Sandbox

security:
  - apiKeyAuth: []

paths:
  /accounts:
    get:
      operationId: listAccounts
      summary: List all accounts for the authenticated customer
      description: |
        Returns all deposit accounts (chequing, savings, TFSA, RRSP) associated
        with the authenticated customer. Includes current balance, available balance,
        and account status.
      tags: [accounts]
      parameters:
        - name: account_type
          in: query
          required: false
          schema:
            type: string
            enum: [chequing, savings, tfsa, rrsp, all]
            default: all
          description: Filter by account type
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, dormant, closed]
            default: active
          description: Filter by account status
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /accounts/{accountId}:
    get:
      operationId: getAccount
      summary: Get account details by ID
      description: Returns full details for a specific account including balance, status, and metadata.
      tags: [accounts]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique account identifier
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Account not found

  /accounts/{accountId}/balance:
    get:
      operationId: getAccountBalance
      summary: Get current and available balance
      description: |
        Returns the current ledger balance and available balance for an account.
        Available balance accounts for holds, pending transactions, and overdraft limits.
      tags: [accounts]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique account identifier
      responses:
        "200":
          description: Balance information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Balance"
        "404":
          description: Account not found

  /accounts/{accountId}/transactions:
    get:
      operationId: getTransactions
      summary: Get transaction history for an account
      description: |
        Returns paginated transaction history. Supports filtering by date range,
        transaction type, and amount range. Results are sorted by transaction date
        descending by default.
      tags: [transactions]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique account identifier
        - name: from_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date for transaction history (YYYY-MM-DD)
        - name: to_date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date for transaction history (YYYY-MM-DD)
        - name: transaction_type
          in: query
          required: false
          schema:
            type: string
            enum: [debit, credit, transfer, fee, interest, all]
            default: all
          description: Filter by transaction type
        - name: min_amount
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Minimum transaction amount filter (CAD)
        - name: max_amount
          in: query
          required: false
          schema:
            type: number
            format: double
          description: Maximum transaction amount filter (CAD)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 200
          description: Number of transactions to return (max 200)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: Pagination offset
      responses:
        "200":
          description: Transaction list with pagination metadata
        "404":
          description: Account not found

  /accounts/{accountId}/overdraft:
    get:
      operationId: getOverdraftStatus
      summary: Get overdraft protection status and limits
      description: |
        Returns the current overdraft protection configuration for an account,
        including the approved limit, current usage, interest rate, and whether
        proactive alerts are enabled.
      tags: [overdraft]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique account identifier
      responses:
        "200":
          description: Overdraft protection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverdraftStatus"
        "404":
          description: Account not found

    patch:
      operationId: updateOverdraftAlerts
      summary: Update overdraft alert configuration
      description: |
        Enables or disables proactive overdraft alerts and configures the threshold
        at which alerts are triggered (e.g. alert when balance drops below $100).
      tags: [overdraft]
      security:
        - apiKeyAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique account identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alerts_enabled]
              properties:
                alerts_enabled:
                  type: boolean
                  description: Enable or disable proactive overdraft alerts
                alert_threshold_cad:
                  type: number
                  format: double
                  description: Balance threshold in CAD that triggers an alert
                alert_channels:
                  type: array
                  items:
                    type: string
                    enum: [email, sms, push]
                  description: Notification channels for alerts
      responses:
        "200":
          description: Alert configuration updated
        "400":
          description: Invalid request body
        "404":
          description: Account not found

  /accounts/{accountId}/risk-score:
    get:
      operationId: getAccountRiskScore
      summary: Get current overdraft risk score for an account
      description: |
        Returns the AI-computed overdraft risk score (0-100) for an account,
        along with contributing factors and the recommendation. Used by the
        proactive overdraft prevention system to determine intervention level.
      tags: [overdraft]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique account identifier
      responses:
        "200":
          description: Risk score and contributing factors
        "404":
          description: Account not found

  /transfers:
    post:
      operationId: createTransfer
      summary: Create an internal transfer between accounts
      description: |
        Initiates a transfer between two accounts owned by the same customer.
        Transfers are processed immediately for same-currency CAD accounts.
        Returns the transfer record with status.
      tags: [transfers]
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_account_id, to_account_id, amount_cad]
              properties:
                from_account_id:
                  type: string
                  format: uuid
                  description: Source account ID
                to_account_id:
                  type: string
                  format: uuid
                  description: Destination account ID
                amount_cad:
                  type: number
                  format: double
                  description: Transfer amount in Canadian dollars
                memo:
                  type: string
                  description: Optional transfer memo (max 140 characters)
      responses:
        "201":
          description: Transfer created successfully
        "400":
          description: Invalid transfer request
        "422":
          description: Insufficient funds

  /customers/{customerId}/alerts:
    get:
      operationId: getCustomerAlerts
      summary: Get all active alerts for a customer
      description: |
        Returns all active financial alerts configured for the customer across
        all accounts. Includes overdraft alerts, large transaction alerts,
        and balance threshold alerts.
      tags: [alerts]
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique customer identifier
      responses:
        "200":
          description: List of active alerts
        "404":
          description: Customer not found

  /customers/{customerId}/alerts/{alertId}:
    delete:
      operationId: deleteAlert
      summary: Delete a configured alert
      description: Permanently removes an alert configuration for a customer.
      tags: [alerts]
      security:
        - apiKeyAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique customer identifier
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unique alert identifier
      responses:
        "204":
          description: Alert deleted
        "404":
          description: Alert not found

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authenticating requests to the Banking API

  schemas:
    Account:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        account_number:
          type: string
          description: Masked account number (last 4 digits)
        account_type:
          type: string
          enum: [chequing, savings, tfsa, rrsp]
        currency:
          type: string
          default: CAD
        status:
          type: string
          enum: [active, dormant, closed]
        nickname:
          type: string
          description: Customer-defined account nickname
        opened_date:
          type: string
          format: date
        institution_number:
          type: string
        transit_number:
          type: string

    Balance:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        current_balance_cad:
          type: number
          format: double
          description: Ledger balance including pending transactions
        available_balance_cad:
          type: number
          format: double
          description: Spendable balance after holds and pending debits
        holds_cad:
          type: number
          format: double
          description: Total amount on hold
        as_of:
          type: string
          format: date-time
          description: Timestamp of balance snapshot

    OverdraftStatus:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        overdraft_enabled:
          type: boolean
        approved_limit_cad:
          type: number
          format: double
        current_usage_cad:
          type: number
          format: double
        available_overdraft_cad:
          type: number
          format: double
        interest_rate_annual:
          type: number
          format: double
          description: Annual interest rate for overdraft usage (e.g. 0.21 = 21%)
        alerts_enabled:
          type: boolean
        alert_threshold_cad:
          type: number
          format: double
