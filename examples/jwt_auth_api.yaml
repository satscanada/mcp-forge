openapi: "3.0.3"
info:
  title: JWT Auth API
  description: Example API using JWT Bearer authentication (bearerFormat JWT).
  version: "1.0.0"
servers:
  - url: https://api.example.com/v1
security:
  - jwtAuth: []
paths:
  /users:
    get:
      operationId: listUsers
      summary: List all users
      description: Returns a paginated list of users.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      security:
        - jwtAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
        "401":
          description: Unauthorized
  /users/{userId}:
    get:
      operationId: getUser
      summary: Get a user by ID
      description: Returns a single user record by their ID.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      security:
        - jwtAuth: []
      responses:
        "200":
          description: User record
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
        "404":
          description: User not found
  /profile:
    get:
      operationId: getProfile
      summary: Get current user profile
      description: Returns the profile of the currently authenticated user.
      security:
        - jwtAuth: []
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                type: object
        "401":
          description: Unauthorized
components:
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token signed with HS256 shared secret.
